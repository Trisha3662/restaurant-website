<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/success.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<div class="bg-container"></div>

<header>
    <nav class="nav-links">
        <a href="index.html" class="back-btn">
            <i class="ri-arrow-left-line"></i> Back to Home
        </a>
        <a href="order.html" class="back-btn">
            <i class="ri-arrow-left-line"></i> Order Online
        </a>
    </nav>
</header>

<div class="cart-container">
    <h2><i class="ri-shopping-cart-2-line"></i> Shopping Cart</h2>

    <div id="cart-items"></div>

    <div id="empty-cart" class="empty-cart-message">
        <i class="ri-shopping-basket-line"></i>
        <h3>Your cart is empty</h3>
        <p>Add some delicious items from our menu!</p>
        <div class="back-to-menu">
            <a href="order.html" class="browse-menu-btn">Order Online</a>
        </div>
    </div>

    <div class="cart-footer">
        <div class="cart-summary">
            <div class="summary-item">
                <span>Subtotal:</span>
                <span>₹<span id="subtotal">0.00</span></span>
            </div>
            <div class="summary-item">
                <span>Delivery Fee:</span>
                <span>₹<span id="delivery-fee">40.00</span></span>
            </div>
            <div class="summary-item total">
                <span>Total:</span>
                <span>₹<span id="total-price">0.00</span></span>
            </div>
        </div>

        <button id="checkout-btn" onclick="checkout()">
            Proceed to Checkout <i class="ri-arrow-right-line"></i>
        </button>
    </div>
</div>

<div id="checkout-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">
            <i class="ri-close-line"></i>
        </span>

        <h2>Order Summary</h2>
        <div id="final-bill"></div>

        <div class="address-section">
            <h3>Delivery Address</h3>
            <input type="text" id="address" placeholder="Enter your delivery address">
        </div>
        <div class="payment-methods">
            <h3>Select Payment Method</h3>
            <div class="payment-options">
                <button class="payment-option"><i class="ri-bank-card-line"></i> Card</button>
                <button class="payment-option"><i class="ri-cash-line"></i> Cash</button>
                <button class="payment-option"><i class="ri-wallet-3-line"></i> UPI</button>
            </div>
        </div>

        <button onclick="placeOrder()" class="place-order-btn">
            Place Order <i class="ri-check-line"></i>
        </button>
    </div>
</div>

<div id="success-modal" class="success-modal">
    <div class="success-content">
        <i class="ri-checkbox-circle-line success-icon"></i>
        <h2>Order Placed!</h2>
        <p id="user-message"></p>

        <button onclick="goHome()" class="go-home-btn">
            Go Home
        </button>
    </div>
</div>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
